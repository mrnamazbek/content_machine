version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-content_machine}
      POSTGRES_USER: ${POSTGRES_USER:-cm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cm_secure_password_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cm_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── n8n Workflow Engine ─────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-change_me}
      - WEBHOOK_URL=http://app:8000
      - N8N_PORT=${N8N_PORT:-5678}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Python App (API + Worker) ───────────────────
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./videos:/app/videos
      - ./auth:/app/auth
      - ./logs:/app/logs
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  n8n_data:
